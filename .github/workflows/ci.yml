name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and test
        run: mvn -B verify

      # Cross-repo proof: export a case from a recorded incident and confirm the
      # real agent-evals loads and runs it (the repos test each other).
      - name: export-eval → run agent-evals on the output
        run: |
          java -jar blackbox-cli/target/blackbox.jar \
            export-eval examples/incident.trace.jsonl --out /tmp/case.yaml --name blackbox-ci
          echo "--- exported case ---"; cat /tmp/case.yaml
          # Pull explicitly first so an unavailable image fails with a clear cause rather
          # than a bare `docker run` error. The GHCR package is public (verified by an
          # unauthenticated pull); if that ever changes, this is the line that says so.
          # We fail rather than skip: this step is the cross-repo proof, and silently
          # passing would make a broken integration look green.
          if ! docker pull ghcr.io/hhagenbuch/agent-evals:0.1.0; then
            echo "::error::agent-evals image unavailable — is the GHCR package still public? (ghcr.io/hhagenbuch/agent-evals:0.1.0)"
            exit 1
          fi
          docker run --rm -v /tmp:/data ghcr.io/hhagenbuch/agent-evals:0.1.0 \
            /data/case.yaml --target echo --report /data/report.md --min-pass-rate 0
